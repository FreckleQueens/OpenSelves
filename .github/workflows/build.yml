name: Build

on:
  workflow_call:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 26.x
      - run: corepack enable
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          key: yarn
          path: ~/.yarn
      - run: yarn install --immutable
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - run: yarn lint

  test-client:
    runs-on: ubuntu-latest

    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 26.x
      - run: corepack enable
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          key: yarn
          path: ~/.yarn
      - run: sudo sh < <(curl -sL https://raw.githubusercontent.com/axllent/mailpit/develop/install.sh)
      - run: sudo ln -s /usr/local/bin/mailpit /usr/sbin/sendmail

      - name: Get installed puppeteer version
        id: puppeteer-version
        run: 'cd client && echo "PUPPETEER_VERSION=$(yarn info --name-only "puppeteer" | cut -d: -f2)" >> $GITHUB_ENV'
      - name: Cache puppeteer binaries
        uses: actions/cache@v5
        id: puppeteer-cache
        with:
          path: |
            ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ env.PUPPETEER_VERSION }}
      - name: Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - run: yarn install --immutable
      - run: yarn build
      - run: yarn workspace openselves-server db:migrate
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
      - run: mkdir server/tmp_upload
      - run: yarn workspace openselves-client test
        env:
          PUBLIC_URL: http://127.0.0.1:3000
          CLIENT_PUBLIC_URL: http://127.0.0.1:5173
          LISTEN_PORT: 3000
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          ALLOWED_ORIGINS: http://127.0.0.1:4173
          JWT_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod
          ACCESS_TOKEN_DURATION: 900
          REFRESH_TOKEN_DURATION: 2592000
          REFRESH_TOKEN_SHORT_DURATION: 86400
          REFRESH_TOKEN_SIZE: 32
          REGISTRATION_PASSWORD: 12345678
          CAPTCHA_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod2
          CAPTCHA_KEY_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod3
          EMAIL_FROM_ADDRESS: noreply@example.com
          MAX_UPLOAD_SIZE: 5000000
          TMP_UPLOAD_DIR: ./tmp_upload
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: puppeteer-report
          path: client/test-results/
          retention-days: 30

  test-server:
    runs-on: ubuntu-latest

    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 26.x
      - run: corepack enable
      - run: sudo sh < <(curl -sL https://raw.githubusercontent.com/axllent/mailpit/develop/install.sh)
      - run: sudo ln -s /usr/local/bin/mailpit /usr/sbin/sendmail
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          key: yarn
          path: ~/.yarn
      - run: yarn install --immutable
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - run: yarn build
      - run: yarn workspace openselves-server db:migrate:test
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres-dummy"
          TEST_DB_URL: "postgres://postgres:postgres@localhost:5432/postgres"
      - run: mkdir server/tmp_upload
      - run: yarn workspace openselves-server test
        env:
          PUBLIC_URL: http://127.0.0.1:3000
          CLIENT_PUBLIC_URL: http://127.0.0.1:5173
          LISTEN_PORT: 3000
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres-dummy"
          TEST_DB_URL: "postgres://postgres:postgres@localhost:5432/postgres"
          ALLOWED_ORIGINS: http://localhost
          JWT_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod
          ACCESS_TOKEN_DURATION: 900
          REFRESH_TOKEN_DURATION: 2592000
          REFRESH_TOKEN_SHORT_DURATION: 86400
          REFRESH_TOKEN_SIZE: 32
          REGISTRATION_PASSWORD: notarealpassword
          CAPTCHA_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod2
          CAPTCHA_KEY_SECRET: thisisnotarealsecretthisisfortestingonlydonotuseinprod3
          EMAIL_FROM_ADDRESS: noreply@example.com
          MAX_UPLOAD_SIZE: 5000000
          TMP_UPLOAD_DIR: ./tmp_upload
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
